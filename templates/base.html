<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Homeowner Association Manager{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/beercss@3.11.33/dist/cdn/beer.min.css" rel="stylesheet">  
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block head_content %}{% endblock %}
</head>
<body>
    <nav class="left max surface-variant l">
        {% include 'partials/nav.html' %}
    </nav>
    <nav class="left large-space surface-variant m">
        {% include 'partials/nav.html' %}
    </nav>
    <dialog id="dialog" class="modal no-elevate"></dialog>
    <main class="responsive">
        {% block body_content %}{% endblock %}
        <div id="flash-messages" hx-get="{{ url_for('flash_fragment') }}" hx-trigger="flash-refresh from:body">
            {% include 'partials/flash_messages.html' %}
        </div>
    </main>
    <script type="module" src="https://cdn.jsdelivr.net/npm/beercss@3.11.33/dist/cdn/beer.min.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/material-dynamic-colors@1.1.2/dist/cdn/material-dynamic-colors.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.6/dist/htmx.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
</body>
</html>
