{% extends "base.html" %}

{% block title %}Charges List{% endblock %}

{% block body_content %}
    <button class="extend circle right-round top-round no-margin"
       data-ui="dialog"
       hx-get="{{ url_for('charges.dialog_fragment') }}?mode=add"
       hx-target="#dialog"
       hx-swap="innerHTML">
        <i>assignment_add</i>
        <span>Add a charge</span>
    </button>

    {# Edit buttons now live inside the table fragment #}

    <div id="charges-table"
         class="top-margin"
         hx-get="{{ url_for('charges.table_fragment') }}"
         hx-trigger="load"
         hx-swap="innerHTML">
      <!-- table loads here via HTMX -->
    </div>

    <!-- No custom JS; HTMX handles dialog loading and table updates -->
{% endblock %}
