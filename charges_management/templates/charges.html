{% extends "base.html" %}

{% block title %}Charges List{% endblock %}

{% block body_content %}
  {% if has_charges %}
    {% include 'partials/charges_main_content.html' %}
  {% else %}
    <article class="middle medium middle-align center-align">
      <div>
        <i class="extra">assignment_late</i>
        <h5>No charges found</h5>
        <p>There are no charges yet.</p>
        <div class="space"></div>
        <nav class="center-align">
          <button data-ui="dialog" hx-get="{{ url_for('charges.dialog_fragment') }}?mode=add&target=charge_page" hx-target="#dialog" hx-swap="innerHTML">
            <i>assignment_add</i>
            <span>Add a charge</span>
          </button>
        </nav>
      </div>
    </article>
  {% endif %}
{% endblock %}
